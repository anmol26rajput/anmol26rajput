name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution radar chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/radar.py << 'PYEOF'
import requests, math, os

token = os.environ["GITHUB_TOKEN"]
username = "anmol26rajput"
query = """query($login: String!) {
  user(login: $login) {
    contributionsCollection {
      totalCommitContributions
      totalPullRequestContributions
      totalIssueContributions
      totalPullRequestReviewContributions
    }
  }
}"""
r = requests.post(
    "https://api.github.com/graphql",
    headers={"Authorization": f"bearer {token}"},
    json={"query": query, "variables": {"login": username}}
)
c = r.json()["data"]["user"]["contributionsCollection"]
data = {
    "commits": c["totalCommitContributions"],
    "prs": c["totalPullRequestContributions"],
    "issues": c["totalIssueContributions"],
    "reviews": c["totalPullRequestReviewContributions"]
}
total = max(sum(data.values()), 1)
cp = data["commits"] / total
pp = data["prs"] / total
ip = data["issues"] / total
rp = data["reviews"] / total
W, H, cx, cy, R = 700, 520, 350, 260, 160

def pt(pct, deg):
    rad = math.radians(deg)
    return cx + pct * R * math.cos(rad), cy - pct * R * math.sin(rad)

def ax(deg):
    rad = math.radians(deg)
    return cx + R * math.cos(rad), cy - R * math.sin(rad)

pr = pt(rp, 90); pi2 = pt(ip, 0); pp2 = pt(pp, 270); pc = pt(cp, 180)
ar = ax(90); ai = ax(0); ap2 = ax(270); ac = ax(180)

def pstr(v): return "{:.0f}%".format(v * 100)

poly = "{:.1f},{:.1f} {:.1f},{:.1f} {:.1f},{:.1f} {:.1f},{:.1f}".format(
    pr[0], pr[1], pi2[0], pi2[1], pp2[0], pp2[1], pc[0], pc[1]
)

svg = """<svg width="{W}" height="{H}" viewBox="0 0 {W} {H}" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0d1117" rx="12"/>
  <line x1="{cx}" y1="{cy}" x2="{ax_r0:.1f}" y2="{ax_r1:.1f}" stroke="#39d35355" stroke-width="1.5"/>
  <line x1="{cx}" y1="{cy}" x2="{ax_i0:.1f}" y2="{ax_i1:.1f}" stroke="#39d35355" stroke-width="1.5"/>
  <line x1="{cx}" y1="{cy}" x2="{ax_p0:.1f}" y2="{ax_p1:.1f}" stroke="#39d35355" stroke-width="1.5"/>
  <line x1="{cx}" y1="{cy}" x2="{ax_c0:.1f}" y2="{ax_c1:.1f}" stroke="#39d35355" stroke-width="1.5"/>
  <polygon points="{poly}" fill="#39d35322" stroke="#39d353" stroke-width="2.5"/>
  <circle cx="{pr0:.1f}" cy="{pr1:.1f}" r="5.5" fill="#0d1117" stroke="#39d353" stroke-width="2.5"/>
  <circle cx="{pi0:.1f}" cy="{pi1:.1f}" r="5.5" fill="#0d1117" stroke="#39d353" stroke-width="2.5"/>
  <circle cx="{pp0:.1f}" cy="{pp1:.1f}" r="5.5" fill="#0d1117" stroke="#39d353" stroke-width="2.5"/>
  <circle cx="{pc0:.1f}" cy="{pc1:.1f}" r="5.5" fill="#0d1117" stroke="#39d353" stroke-width="2.5"/>
  <text x="{ar0:.1f}" y="{ar1_top:.1f}" fill="#39d353" font-size="16" text-anchor="middle" font-family="ui-monospace,monospace" font-weight="600">{rp_str}</text>
  <text x="{ar0:.1f}" y="{ar1_bot:.1f}" fill="#8b949e" font-size="13" text-anchor="middle" font-family="ui-monospace,monospace">Code review</text>
  <text x="{ai0_right:.1f}" y="{ai1_top:.1f}" fill="#39d353" font-size="16" text-anchor="start" font-family="ui-monospace,monospace" font-weight="600">{ip_str}</text>
  <text x="{ai0_right:.1f}" y="{ai1_bot:.1f}" fill="#8b949e" font-size="13" text-anchor="start" font-family="ui-monospace,monospace">Issues</text>
  <text x="{ap0:.1f}" y="{ap1_top:.1f}" fill="#39d353" font-size="16" text-anchor="middle" font-family="ui-monospace,monospace" font-weight="600">{pp_str}</text>
  <text x="{ap0:.1f}" y="{ap1_bot:.1f}" fill="#8b949e" font-size="13" text-anchor="middle" font-family="ui-monospace,monospace">Pull requests</text>
  <text x="{ac0_left:.1f}" y="{ac1_top:.1f}" fill="#39d353" font-size="16" text-anchor="end" font-family="ui-monospace,monospace" font-weight="600">{cp_str}</text>
  <text x="{ac0_left:.1f}" y="{ac1_bot:.1f}" fill="#8b949e" font-size="13" text-anchor="end" font-family="ui-monospace,monospace">Commits</text>
</svg>""".format(
    W=W, H=H, cx=cx, cy=cy, poly=poly,
    ax_r0=ar[0], ax_r1=ar[1], ax_i0=ai[0], ax_i1=ai[1],
    ax_p0=ap2[0], ax_p1=ap2[1], ax_c0=ac[0], ax_c1=ac[1],
    pr0=pr[0], pr1=pr[1], pi0=pi2[0], pi1=pi2[1],
    pp0=pp2[0], pp1=pp2[1], pc0=pc[0], pc1=pc[1],
    ar0=ar[0], ar1_top=ar[1]-24, ar1_bot=ar[1]-8,
    ai0_right=ai[0]+16, ai1_top=ai[1]-5, ai1_bot=ai[1]+11,
    ap0=ap2[0], ap1_top=ap2[1]+24, ap1_bot=ap2[1]+40,
    ac0_left=ac[0]-16, ac1_top=ac[1]-5, ac1_bot=ac[1]+11,
    rp_str=pstr(rp), ip_str=pstr(ip), pp_str=pstr(pp), cp_str=pstr(cp)
)

with open("contribution-chart.svg", "w") as f:
    f.write(svg)
print("Generated contribution-chart.svg:", data)
PYEOF
          python3 /tmp/radar.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contribution-chart.svg
          git commit -m "chore: update contribution chart [skip ci]" || echo "No changes"
          git push
